# ============================================================================
# Déploiement de l'API GNL Graph
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gnl-graph.fullname" . }}-api
  namespace: {{ .Values.global.namespace | default "gnl-knowledge-graph" }}
  labels:
    {{- include "gnl-graph.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "gnl-graph.selectorLabels" . | nindent 6 }}
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "gnl-graph.selectorLabels" . | nindent 8 }}
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- include "gnl-graph.imagePullSecret" . | nindent 6 }}
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: {{ .Values.api.service.port | default 8000 }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "gnl-graph.fullname" . }}-config
        - secretRef:
            name: {{ include "gnl-graph.fullname" . }}-secrets
        env:
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "gnl-graph.fullname" . }}-secrets
              key: neo4j-password
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "gnl-graph.fullname" . }}-secrets
              key: api-secret-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "gnl-graph.fullname" . }}-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "gnl-graph.fullname" . }}-data
      terminationGracePeriodSeconds: 30