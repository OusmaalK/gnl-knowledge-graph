apiVersion: v2
name: gnl-graph
description: Chart Helm pour GNL Knowledge Graph
type: application
version: 1.0.0
appVersion: 1.0.0

dependencies:
  - name: neo4j
    version: 5.14.0
    repository: https://neo4j.github.io/helm-charts/
    condition: neo4j.enabled
  - name: qdrant
    version: 0.7.0
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  - name: kafka
    version: 23.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled