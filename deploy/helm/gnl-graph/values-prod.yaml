# Values pour l'environnement de production

global:
  environment: prod

neo4j:
  replicas: 2
  resources:
    requests:
      memory: 4Gi
      cpu: 2
    limits:
      memory: 8Gi
      cpu: 4

api:
  replicas: 3
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1

agents:
  replicas: 2
  resources:
    requests:
      memory: 1Gi
      cpu: 1
    limits:
      memory: 2Gi
      cpu: 2

ingress:
  enabled: true

monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 30d
  grafana:
    enabled: true
    adminPassword: ${GRAFANA_PASSWORD}

storage:
  neo4j:
    size: 100Gi
  qdrant:
    size: 50Gi