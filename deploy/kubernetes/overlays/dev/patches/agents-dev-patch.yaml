# ============================================================================
# Patch Agents - Développement
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnl-agents
  namespace: gnl-knowledge-graph
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: gnl-agents
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"