# ============================================================================
# Patch Neo4j - Staging
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: gnl-knowledge-graph
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: neo4j
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        env:
        - name: NEO4J_dbms_memory_heap_initial__size
          value: "512m"
        - name: NEO4J_dbms_memory_heap_max__size
          value: "2g"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "1g"