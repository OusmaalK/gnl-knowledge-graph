# ============================================================================
# Patch Ingress - Production
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gnl-api-ingress
  namespace: gnl-knowledge-graph
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
  - hosts:
    - api.gnl-knowledge-graph.com
    secretName: gnl-api-tls-prod
  rules:
  - host: api.gnl-knowledge-graph.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000