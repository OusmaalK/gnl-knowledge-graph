# ============================================================================
# Patch API - Production
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnl-api
  namespace: gnl-knowledge-graph
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
      - name: gnl-api
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        env:
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "WARNING"
        - name: API_ACCESS_TOKEN_EXPIRE_MINUTES
          value: "15"
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3