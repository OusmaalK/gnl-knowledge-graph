apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnl-api
  namespace: gnl-knowledge-graph
  labels:
    app: gnl-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gnl-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gnl-api
        component: api
    spec:
      containers:
      - name: gnl-api
        image: gnl-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: gnl-config
        - secretRef:
            name: gnl-secrets
        env:
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gnl-secrets
              key: neo4j-password
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: gnl-secrets
              key: api-secret-key
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"