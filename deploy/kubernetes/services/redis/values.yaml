# ============================================================================
# Values pour Redis
# ============================================================================

redis:
  image:
    repository: redis
    tag: 7.2-alpine
    pullPolicy: IfNotPresent
  
  replicas: 1
  
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard
  
  config:
    maxmemory: "256mb"
    maxmemory_policy: allkeys-lru
    appendonly: "yes"
    save:
      - "900 1"
      - "300 10"
      - "60 10000"
  
  service:
    type: ClusterIP
    port: 6379
  
  monitoring:
    enabled: true
    prometheus:
      port: 9121
      image: oliver006/redis_exporter:latest