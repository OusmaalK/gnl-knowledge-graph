# ============================================================================
# Service Redis
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: gnl-knowledge-graph
  labels:
    app: redis
    component: cache
spec:
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP