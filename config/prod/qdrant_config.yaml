# ============================================================================
# Qdrant Configuration - Production
# ============================================================================
# Description: Configuration de Qdrant pour l'environnement de production
# ============================================================================

qdrant:
  # Connexion
  host: "qdrant-service"
  port: 6333
  grpc_port: 6334
  api_key: "${QDRANT_API_KEY}"
  
  # Collections
  collections:
    gnl_incidents_embeddings:
      vector_size: 768
      distance: "Cosine"
      on_disk_payload: true
      optimizers:
        default_segment_number: 4
        max_segment_size: 100000
        memmap_threshold: 50000
        indexing_threshold: 50000
      hnsw_config:
        m: 32
        ef_construct: 200
        full_scan_threshold: 50000
      wal_config:
        wal_capacity_mb: 64
        wal_segments_ahead: 2
      quantization:
        enabled: true
        type: "scalar"
        quantile: 0.99
    
    gnl_maintenance_embeddings:
      vector_size: 768
      distance: "Cosine"
      on_disk_payload: true
      optimizers:
        default_segment_number: 4
        max_segment_size: 100000
      hnsw_config:
        m: 32
        ef_construct: 200
      wal_config:
        wal_capacity_mb: 64
        wal_segments_ahead: 2
    
    gnl_logistics_embeddings:
      vector_size: 768
      distance: "Cosine"
      on_disk_payload: true
      optimizers:
        default_segment_number: 4
        max_segment_size: 100000
      hnsw_config:
        m: 32
        ef_construct: 200
    
    gnl_knowledge:
      vector_size: 768
      distance: "Cosine"
      on_disk_payload: true
      optimizers:
        default_segment_number: 4
        max_segment_size: 100000
      hnsw_config:
        m: 32
        ef_construct: 200
  
  # Recherche
  search:
    default_limit: 20
    max_limit: 200
    with_payload: true
    with_vector: false
  
  # Performance
  performance:
    max_threads: 8
    batch_size: 200
    timeout: 60
  
  # Monitoring
  monitoring:
    enabled: true
    metrics:
      port: 6333
      path: "/metrics"