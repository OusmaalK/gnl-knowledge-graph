# ============================================================================
# Alerts Configuration
# ============================================================================
# Description: Configuration partagée des alertes pour tous les environnements
# ============================================================================

# Alertes API
api_alerts:
  - name: "api_high_error_rate"
    description: "Taux d'erreur API élevé"
    condition: "rate(gnl_api_requests_total{status=~'5..'}[5m]) / rate(gnl_api_requests_total[5m]) > 0.05"
    severity: "critical"
    for: "5m"
    labels:
      component: "api"
    annotations:
      summary: "Taux d'erreur API élevé"
      description: "Le taux d'erreur API est de {{ $value | humanizePercentage }}"
      runbook: "https://wiki.gnl-company.com/runbooks/api-high-error-rate"
  
  - name: "api_slow_response"
    description: "Temps de réponse API lent"
    condition: "histogram_quantile(0.95, sum(rate(gnl_api_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 5"
    severity: "warning"
    for: "10m"
    labels:
      component: "api"
    annotations:
      summary: "Temps de réponse API lent"
      description: "Le temps de réponse de l'API est de {{ $value | humanizeDuration }}"
      runbook: "https://wiki.gnl-company.com/runbooks/api-slow-response"

# Alertes Neo4j
neo4j_alerts:
  - name: "neo4j_query_slow"
    description: "Requêtes Neo4j lentes"
    condition: "histogram_quantile(0.95, sum(rate(gnl_graph_query_duration_seconds_bucket[5m])) by (le, query_type)) > 10"
    severity: "warning"
    for: "10m"
    labels:
      component: "neo4j"
    annotations:
      summary: "Requêtes Neo4j lentes"
      description: "Le temps de réponse des requêtes Neo4j est de {{ $value | humanizeDuration }}"
      runbook: "https://wiki.gnl-company.com/runbooks/neo4j-slow-queries"
  
  - name: "neo4j_connection_failed"
    description: "Échec de connexion Neo4j"
    condition: "gnl_system_neo4j_up == 0"
    severity: "critical"
    for: "1m"
    labels:
      component: "neo4j"
    annotations:
      summary: "Échec de connexion Neo4j"
      description: "La connexion à Neo4j a échoué"
      runbook: "https://wiki.gnl-company.com/runbooks/neo4j-connection-failed"

# Alertes Agents
agent_alerts:
  - name: "agent_high_error_rate"
    description: "Taux d'erreur des agents élevé"
    condition: "rate(gnl_agent_calls_total{success='false'}[5m]) / rate(gnl_agent_calls_total[5m]) > 0.1"
    severity: "critical"
    for: "5m"
    labels:
      component: "agents"
    annotations:
      summary: "Taux d'erreur des agents élevé"
      description: "Le taux d'erreur des agents est de {{ $value | humanizePercentage }}"
      runbook: "https://wiki.gnl-company.com/runbooks/agents-high-error-rate"
  
  - name: "agent_slow_response"
    description: "Réponse des agents lente"
    condition: "histogram_quantile(0.95, sum(rate(gnl_agent_duration_seconds_bucket[5m])) by (le, agent)) > 30"
    severity: "warning"
    for: "10m"
    labels:
      component: "agents"
    annotations:
      summary: "Réponse des agents lente"
      description: "Le temps de réponse des agents est de {{ $value | humanizeDuration }}"
      runbook: "https://wiki.gnl-company.com/runbooks/agents-slow-response"

# Alertes Cache
cache_alerts:
  - name: "cache_low_hit_rate"
    description: "Taux de cache faible"
    condition: "sum(rate(gnl_cache_hits_total[5m])) / (sum(rate(gnl_cache_hits_total[5m])) + sum(rate(gnl_cache_misses_total[5m]))) < 0.5"
    severity: "warning"
    for: "15m"
    labels:
      component: "cache"
    annotations:
      summary: "Taux de cache faible"
      description: "Le taux de cache est de {{ $value | humanizePercentage }}"
      runbook: "https://wiki.gnl-company.com/runbooks/cache-low-hit-rate"

# Alertes Ingestion
ingestion_alerts:
  - name: "ingestion_failure"
    description: "Échec d'ingestion de données"
    condition: "increase(gnl_ingestion_records_total{success='false'}[5m]) > 0"
    severity: "critical"
    for: "1m"
    labels:
      component: "ingestion"
    annotations:
      summary: "Échec d'ingestion de données"
      description: "Un échec d'ingestion de données a été détecté"
      runbook: "https://wiki.gnl-company.com/runbooks/ingestion-failure"
  
  - name: "ingestion_low_rate"
    description: "Taux d'ingestion faible"
    condition: "rate(gnl_ingestion_records_total[5m]) < 10"
    severity: "warning"
    for: "30m"
    labels:
      component: "ingestion"
    annotations:
      summary: "Taux d'ingestion faible"
      description: "Le taux d'ingestion est de {{ $value }} enregistrements par minute"
      runbook: "https://wiki.gnl-company.com/runbooks/ingestion-low-rate"

# Alertes Système
system_alerts:
  - name: "system_high_memory"
    description: "Utilisation mémoire élevée"
    condition: "gnl_system_memory_bytes / gnl_system_memory_limit_bytes > 0.85"
    severity: "warning"
    for: "10m"
    labels:
      component: "system"
    annotations:
      summary: "Utilisation mémoire élevée"
      description: "L'utilisation mémoire est de {{ $value | humanizePercentage }}"
      runbook: "https://wiki.gnl-company.com/runbooks/system-high-memory"
  
  - name: "system_high_cpu"
    description: "Utilisation CPU élevée"
    condition: "gnl_system_cpu_percent > 80"
    severity: "warning"
    for: "10m"
    labels:
      component: "system"
    annotations:
      summary: "Utilisation CPU élevée"
      description: "L'utilisation CPU est de {{ $value }}%"
      runbook: "https://wiki.gnl-company.com/runbooks/system-high-cpu"

# Notification Channels
notification_channels:
  slack:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#gnl-alerts"
    username: "GNL Bot"
    icon_emoji: ":gnl:"
  
  email:
    enabled: true
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    from: "alerts@gnl-company.com"
    to: "team@gnl-company.com"
  
  pagerduty:
    enabled: false
    service_key: "${PAGERDUTY_SERVICE_KEY}"
  
  webhook:
    enabled: false
    url: "${WEBHOOK_URL}"
    headers:
      Content-Type: "application/json"

# Escalation
escalation:
  levels:
    - level: 1
      name: "DevOps"
      contact: "devops@gnl-company.com"
      response_time: "15m"
    
    - level: 2
      name: "SRE"
      contact: "sre@gnl-company.com"
      response_time: "30m"
    
    - level: 3
      name: "Architecte"
      contact: "architect@gnl-company.com"
      response_time: "2h"