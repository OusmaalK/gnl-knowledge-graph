# ============================================================================
# Logging Configuration
# ============================================================================
# Description: Configuration partagée du logging pour tous les environnements
# ============================================================================

version: 1
disable_existing_loggers: false

# Formatters
formatters:
  json:
    format: '{"timestamp":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","message":"%(message)s","module":"%(module)s","function":"%(funcName)s","line":"%(lineno)d"}'
    datefmt: '%Y-%m-%dT%H:%M:%SZ'
    class: pythonjsonlogger.jsonlogger.JsonFormatter
  
  console:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

# Handlers
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/gnl_app.log
    maxBytes: 10485760
    backupCount: 10
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/gnl_errors.log
    maxBytes: 10485760
    backupCount: 5
  
  access_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/gnl_access.log
    maxBytes: 10485760
    backupCount: 10

# Loggers
loggers:
  src:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  src.api:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.agents:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.graph:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.ingestion:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.infrastructure:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.models:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.monitoring:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  src.transform:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  api.access:
    level: INFO
    handlers: [access_file]
    propagate: false
  
  uvicorn:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  uvicorn.error:
    level: INFO
    handlers: [console, error_file]
    propagate: false

# Root logger
root:
  level: INFO
  handlers: [console, file, error_file]